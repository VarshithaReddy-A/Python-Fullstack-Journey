<!DOCTYPE html>
<html>
<head>
    <title>CSS Types</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Internal CSS -->
    <style>

        div{
            color: red;
            background: blue;
        }

        .e1i{
            background: red;
            width:200px;
            height:300px;
            padding:10px 20px 30px 40px;
            margin:10px 20px 30px 40px;
            border: 4px double black;
        }

        .e12{
            background-color: greenyellow
            
        }
    </style>
</head>
<body>
    <!-- Inline CSS -->
    <h1 style="color:red;">Inline Style</h1>
    <!-- Internal CSS -->
    <div>Internal Styling</div>
    <!-- Class Example -->
    <div class="e1i">
        Box Model 
    </div>
    <div class="e12">
        Another Box
    </div>
    <!-- External CSS -->
    <h3>External Styling</h3>
    
</body>
</html>
