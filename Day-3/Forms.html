<!DOCTYPE html>
<html>
    <head>
        <title>Forms</title>
    </head>
    <body>
        <h1>Registration Form</h1>
        <form action="">
        <label for="un">Fullname</label><br>
        <input type="text" id="un" placeholder="Enter your Full name">
        <br><br>
        <label for="">Email</label><br>
        <input type="email" placeholder="Enter your email" required>
        <br><br>
        <label for="pass1">Password</label><br>
        <input type="password" id="pass1" placeholder="Create a password" required>
        <br><br>
        <label for="pass2">Confirm Password</label><br>
        <input type="password" id="pass2" required>
        <br><br>
       <div>Gender</div>
       <input type="radio" name="gender" value="male" id="m">
        <label for="m">male</label>
        <input type="radio" name="gender" value="female" id="f">
        <label for="f">female</label>
        <input type="radio" name="gender" value="other" id="o">
        <label for="o">other</label><br><br>
        <label for="dob">Date of Birth</label>
        <input type="date" id="dob" required>
        <br><br>
        <label for="comment">Comment</label><br>
        <textarea id="comment" placeholder="Enter your comment" required></textarea>
        <br><br>
        <input type="submit" value="Submit"> 
        <input type="reset" value="reset">
        </form>
    </body>
</html>
